<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFM-CAD - AI-Powered Design for Manufacturing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #viewer {
            background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%);
        }
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #7eb8da;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .drag-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .drag-area:hover, .drag-area.drag-over {
            border-color: #7eb8da;
            background: rgba(126, 184, 218, 0.1);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold mb-2">DFM-CAD</h1>
            <p class="text-gray-400">AI-powered text & image to manufacturable CAD</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Input Panel -->
            <div class="card rounded-xl p-6">
                <h2 class="text-xl font-semibold mb-4">Describe Your Part</h2>
                
                <!-- Text Input -->
                <div class="mb-4">
                    <label class="block text-sm text-gray-400 mb-2">Text Description</label>
                    <textarea 
                        id="prompt" 
                        rows="3"
                        class="w-full bg-black/30 border border-white/10 rounded-lg p-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-400"
                        placeholder="L-bracket with 4 mounting holes for M5 bolts, 50mm x 50mm..."
                    ></textarea>
                </div>

                <!-- Image Upload -->
                <div class="mb-4">
                    <label class="block text-sm text-gray-400 mb-2">Reference Image (optional)</label>
                    <div 
                        id="dropZone"
                        class="drag-area rounded-lg p-6 text-center cursor-pointer"
                        onclick="document.getElementById('imageInput').click()"
                    >
                        <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleImageSelect(event)">
                        <div id="dropZoneContent">
                            <svg class="w-10 h-10 mx-auto mb-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                            <p class="text-gray-500">Drop image here or click to upload</p>
                        </div>
                        <div id="imagePreviewContainer" class="hidden">
                            <img id="imagePreview" class="max-h-32 mx-auto rounded">
                            <button onclick="clearImage(event)" class="mt-2 text-red-400 text-sm hover:text-red-300">Remove</button>
                        </div>
                    </div>
                </div>

                <!-- Process & Material -->
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Manufacturing Process</label>
                        <select id="process" class="w-full bg-black/30 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-blue-400">
                            <option value="cnc_milling">CNC Milling</option>
                            <option value="injection_molding">Injection Molding</option>
                            <option value="fdm_printing">3D Printing (FDM)</option>
                            <option value="sheet_metal">Sheet Metal</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Material</label>
                        <select id="material" class="w-full bg-black/30 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-blue-400">
                            <option value="aluminum_6061">Aluminum 6061</option>
                            <option value="steel_1018">Steel 1018</option>
                            <option value="stainless_304">Stainless 304</option>
                            <option value="abs_plastic">ABS Plastic</option>
                            <option value="pla">PLA</option>
                            <option value="delrin">Delrin</option>
                        </select>
                    </div>
                </div>

                <!-- Generate Button -->
                <button 
                    id="generateBtn"
                    onclick="generate()"
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-6 rounded-lg transition-colors flex items-center justify-center gap-2"
                >
                    <span id="btnText">Generate</span>
                    <div id="btnLoader" class="loader hidden"></div>
                </button>

                <!-- Iteration Input -->
                <div id="iterateSection" class="mt-4 hidden">
                    <div class="border-t border-white/10 pt-4">
                        <label class="block text-sm text-gray-400 mb-2">Modify Design</label>
                        <div class="flex gap-2">
                            <input 
                                type="text" 
                                id="iteratePrompt"
                                class="flex-1 bg-black/30 border border-white/10 rounded-lg p-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-400"
                                placeholder="Make walls thicker, add more holes..."
                            >
                            <button 
                                onclick="iterate()"
                                class="bg-purple-600 hover:bg-purple-500 text-white font-semibold py-3 px-6 rounded-lg transition-colors"
                            >
                                Update
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Preview Panel -->
            <div class="card rounded-xl p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold">3D Preview</h2>
                    <div id="downloadBtns" class="hidden flex gap-2">
                        <button onclick="download('step')" class="bg-green-600 hover:bg-green-500 text-white text-sm py-2 px-4 rounded-lg transition-colors">
                            Download STEP
                        </button>
                        <button onclick="download('stl')" class="bg-gray-600 hover:bg-gray-500 text-white text-sm py-2 px-4 rounded-lg transition-colors">
                            Download STL
                        </button>
                    </div>
                </div>
                
                <!-- 3D Viewer -->
                <div id="viewer" class="rounded-lg h-80 flex items-center justify-center">
                    <p id="viewerPlaceholder" class="text-gray-500">Generate a model to see preview</p>
                </div>

                <!-- Geometry Stats -->
                <div id="geometryStats" class="hidden mt-4 grid grid-cols-3 gap-4 text-center">
                    <div class="bg-black/20 rounded-lg p-3">
                        <p class="text-2xl font-bold text-blue-400" id="statVolume">-</p>
                        <p class="text-xs text-gray-500">Volume (mm³)</p>
                    </div>
                    <div class="bg-black/20 rounded-lg p-3">
                        <p class="text-2xl font-bold text-blue-400" id="statFaces">-</p>
                        <p class="text-xs text-gray-500">Faces</p>
                    </div>
                    <div class="bg-black/20 rounded-lg p-3">
                        <p class="text-2xl font-bold text-blue-400" id="statHoles">-</p>
                        <p class="text-xs text-gray-500">Holes</p>
                    </div>
                </div>

                <!-- DFM Warnings -->
                <div id="dfmSection" class="hidden mt-4">
                    <h3 class="font-semibold mb-2 flex items-center gap-2">
                        <span id="dfmIcon">✓</span>
                        DFM Analysis
                    </h3>
                    <div id="dfmWarnings" class="space-y-2"></div>
                </div>
            </div>
        </div>

        <!-- Error Display -->
        <div id="errorDisplay" class="hidden mt-6 card rounded-xl p-4 border-red-500/50">
            <p class="text-red-400" id="errorText"></p>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let currentModelId = null;
        let scene, camera, renderer, controls, currentMesh;

        // Initialize 3D viewer
        function initViewer() {
            const container = document.getElementById('viewer');
            const width = container.clientWidth;
            const height = container.clientHeight;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f0f1a);

            camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
            camera.position.set(60, 60, 60);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);

            // Lights
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(50, 50, 50);
            scene.add(directionalLight);

            const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight2.position.set(-50, -50, 50);
            scene.add(directionalLight2);

            // Grid
            const gridHelper = new THREE.GridHelper(100, 10, 0x333333, 0x222222);
            scene.add(gridHelper);
        }

        function showViewer() {
            const container = document.getElementById('viewer');
            document.getElementById('viewerPlaceholder').style.display = 'none';
            container.innerHTML = '';
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();
        }

        function loadSTL(url) {
            if (currentMesh) {
                scene.remove(currentMesh);
            }

            const loader = new THREE.STLLoader();
            loader.load(url, function(geometry) {
                const material = new THREE.MeshStandardMaterial({
                    color: 0x7eb8da,
                    metalness: 0.3,
                    roughness: 0.5
                });
                currentMesh = new THREE.Mesh(geometry, material);

                geometry.computeBoundingBox();
                const center = geometry.boundingBox.getCenter(new THREE.Vector3());
                currentMesh.position.sub(center);
                currentMesh.position.y += 5;

                scene.add(currentMesh);
            });
        }

        // Image handling
        let selectedImage = null;

        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedImage = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('dropZoneContent').classList.add('hidden');
                    document.getElementById('imagePreviewContainer').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function clearImage(event) {
            event.stopPropagation();
            selectedImage = null;
            document.getElementById('imageInput').value = '';
            document.getElementById('dropZoneContent').classList.remove('hidden');
            document.getElementById('imagePreviewContainer').classList.add('hidden');
        }

        // Drag and drop
        const dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                document.getElementById('imageInput').files = e.dataTransfer.files;
                handleImageSelect({ target: { files: [file] } });
            }
        });

        // Generate model
        async function generate() {
            const prompt = document.getElementById('prompt').value;
            const process = document.getElementById('process').value;
            const material = document.getElementById('material').value;

            if (!prompt && !selectedImage) {
                showError('Please enter a description or upload an image');
                return;
            }

            setLoading(true);
            hideError();

            try {
                const formData = new FormData();
                formData.append('prompt', prompt || 'Recreate this part');
                formData.append('process', process);
                formData.append('material', material);
                if (selectedImage) {
                    formData.append('image', selectedImage);
                }

                const response = await fetch(`${API_URL}/generate`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Generation failed');
                }

                const data = await response.json();
                currentModelId = data.model_id;

                // Show viewer and load model
                if (!renderer) initViewer();
                showViewer();
                loadSTL(`${API_URL}${data.preview_url}`);

                // Update stats
                document.getElementById('geometryStats').classList.remove('hidden');
                document.getElementById('statVolume').textContent = Math.round(data.geometry.volume_mm3).toLocaleString();
                document.getElementById('statFaces').textContent = data.geometry.faces;
                document.getElementById('statHoles').textContent = data.geometry.holes;

                // Update DFM
                document.getElementById('dfmSection').classList.remove('hidden');
                updateDFM(data.dfm_passed, data.dfm_warnings);

                // Show download buttons and iterate section
                document.getElementById('downloadBtns').classList.remove('hidden');
                document.getElementById('downloadBtns').classList.add('flex');
                document.getElementById('iterateSection').classList.remove('hidden');

            } catch (error) {
                showError(error.message);
            } finally {
                setLoading(false);
            }
        }

        // Iterate on model
        async function iterate() {
            const modification = document.getElementById('iteratePrompt').value;
            if (!modification || !currentModelId) return;

            setLoading(true);
            hideError();

            try {
                const response = await fetch(`${API_URL}/iterate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model_id: currentModelId,
                        modification: modification
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Iteration failed');
                }

                const data = await response.json();
                currentModelId = data.model_id;

                loadSTL(`${API_URL}${data.preview_url}`);

                document.getElementById('statVolume').textContent = Math.round(data.geometry.volume_mm3).toLocaleString();
                document.getElementById('statFaces').textContent = data.geometry.faces;
                document.getElementById('statHoles').textContent = data.geometry.holes;
                updateDFM(data.dfm_passed, data.dfm_warnings);

                document.getElementById('iteratePrompt').value = '';

            } catch (error) {
                showError(error.message);
            } finally {
                setLoading(false);
            }
        }

        function updateDFM(passed, warnings) {
            const icon = document.getElementById('dfmIcon');
            const container = document.getElementById('dfmWarnings');

            if (passed && warnings.length === 0) {
                icon.textContent = '✓';
                icon.className = 'text-green-400';
                container.innerHTML = '<p class="text-green-400 text-sm">All DFM checks passed!</p>';
            } else {
                icon.textContent = passed ? '⚠' : '✗';
                icon.className = passed ? 'text-yellow-400' : 'text-red-400';

                container.innerHTML = warnings.map(w => {
                    const color = w.severity === 'error' ? 'red' : w.severity === 'warning' ? 'yellow' : 'blue';
                    return `<div class="text-sm p-2 rounded bg-${color}-500/10 border border-${color}-500/30 text-${color}-400">${w.message}</div>`;
                }).join('');
            }
        }

        function download(format) {
            if (currentModelId) {
                window.location.href = `${API_URL}/model/${currentModelId}/download?format=${format}`;
            }
        }

        function setLoading(loading) {
            document.getElementById('generateBtn').disabled = loading;
            document.getElementById('btnText').textContent = loading ? 'Generating...' : 'Generate';
            document.getElementById('btnLoader').classList.toggle('hidden', !loading);
        }

        function showError(message) {
            document.getElementById('errorDisplay').classList.remove('hidden');
            document.getElementById('errorText').textContent = message;
        }

        function hideError() {
            document.getElementById('errorDisplay').classList.add('hidden');
        }

        // Initialize
        initViewer();
    </script>
</body>
</html>
